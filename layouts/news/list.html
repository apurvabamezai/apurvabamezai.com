{{ define "main" }}
<section class="section page-section">
  <div class="container">
    <h1 class="page-title">News</h1>

    {{ range .Pages.ByDate.Reverse }}
    <article class="news-item">
      <div class="news-date">{{ .Date.Format "January 2, 2006" }}</div>
      <h2 class="news-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      {{ with .Params.summary }}<p class="news-summary">{{ . }}</p>{{ end }}
    </article>
    {{ end }}

    {{ if eq (len .Pages) 0 }}
    <p class="empty-state">No news posts yet. Check back soon!</p>
    {{ end }}
  </div>
</section>
{{ end }}
