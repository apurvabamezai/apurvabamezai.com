{{ define "main" }}
{{ $cv := .Site.Data.cv }}

<section class="section page-section">
  <div class="container">
    <h1 class="page-title">Teaching</h1>

    <h2 class="subsection-title">{{ $cv.teaching.role }}</h2>

    <div class="teaching-grid">
      {{ range $cv.teaching.courses }}
      <div class="teaching-card">
        <h3 class="teaching-course">{{ .name }}</h3>
        <p class="teaching-meta">{{ .instructor }} &middot; {{ .semester }}</p>
      </div>
      {{ end }}
    </div>

    {{ with $cv.teaching.training }}
    <h2 class="subsection-title" style="margin-top: 2.5rem;">Training</h2>
    <ul>
      {{ range . }}
      <li>{{ . }}</li>
      {{ end }}
    </ul>
    {{ end }}
  </div>
</section>
{{ end }}
