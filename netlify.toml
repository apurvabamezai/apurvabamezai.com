# Netlify configuration
# Note: Primary deployment is via GitHub Actions, but this config
# serves as a fallback if you connect the repo directly to Netlify.

[build]
  publish = "public"
  command = "hugo --minify"

[build.environment]
  HUGO_VERSION = "0.140.0"

# Redirects — ensure www goes to apex domain (or vice versa)
[[redirects]]
  from = "https://apurvabamezai.com/*"
  to = "https://www.apurvabamezai.com/:splat"
  status = 301
  force = true

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/files/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
