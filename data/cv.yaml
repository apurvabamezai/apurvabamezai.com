# -----------------------------------------------------------------------------
# SHORT BIO (for website homepage hero section)
# -----------------------------------------------------------------------------
bio:
  # 1-2 sentence version for the hero area
  short: >
    I am a Postdoctoral Visiting Fellow at the Kellogg Institute for International
    Studies, University of Notre Dame. I will join Ashoka University as an Assistant
    Professor of Political Science in August 2026.

  # Full bio for the About section — stored as HTML to preserve hyperlinks.
  # To edit: change text/URLs below. Hugo renders this with safeHTML.
  long_html: |
    <p>I am a Postdoctoral Visiting Fellow at <a href="https://kellogg.nd.edu/" target="_blank" rel="noopener">Kellogg Institute for International Studies, Keough School of Global Affairs, University of Notre Dame</a>. I will join <a href="https://www.ashoka.edu.in/department/department-of-political-science/" target="_blank" rel="noopener">Ashoka University</a> as an Assistant Professor of Political Science in August 2026.</p>

    <p>I hold a PhD in Political Science from <a href="https://www.polisci.upenn.edu/" target="_blank" rel="noopener">University of Pennsylvania</a>. While at Penn, I was also affiliated to the <a href="https://casi.sas.upenn.edu/" target="_blank" rel="noopener">Center for Advanced Study of India</a> and the <a href="https://pdri-devlab.upenn.edu/" target="_blank" rel="noopener">Penn Development Research Initiative (PDRI) - DevLab@Penn</a>. My work is forthcoming in the Journal of Development Economics.</p>

    <p>My main research interests include political selection, bureaucracy and public goods provision, with a regional focus on India. My current research agenda is centered on political entry in rural local government in India. My dissertation project looks at public sector employment as a pathway to local electoral politics. I am also collaborating with researchers on projects to (i) establish who becomes a politician using census data on citizens and the universe of candidates in village-council elections, (ii) evaluate the impact of peer networks for local politicians, and (iii) examine the effectiveness of gender quotas in terms of women exercising de facto political leadership. My current projects are all based in the state of Bihar (where I have conducted research consistently since 2011). In my research projects, I employ both quantitative and qualitative methods.</p>

    <p>My research projects have been funded by the <a href="https://bfi.uchicago.edu/the-weiss-fund/" target="_blank" rel="noopener">Weiss Fund for Research in Development Economics</a>, <a href="https://www.povertyactionlab.org/initiative/governance-initiative" target="_blank" rel="noopener">J-PAL's Governance Initiative</a>, the <a href="https://www.theigc.org/" target="_blank" rel="noopener">International Growth Centre (IGC)</a>, <a href="https://casi.sas.upenn.edu/studentprograms/sobtifamilyfellowshipfund" target="_blank" rel="noopener">Sobti Family Fellowship (CASI)</a>, <a href="https://pdri-devlab.upenn.edu/" target="_blank" rel="noopener">Penn Development Research Initiative (PDRI) - DevLab@Penn</a>, <a href="https://cseri.sas.upenn.edu/" target="_blank" rel="noopener">Center for the Study of Ethnicity, Race, and Immigration</a>, <a href="https://bc.sas.upenn.edu/" target="_blank" rel="noopener">Christopher H. Browne Center for International Politics</a>, Judith Rodin Fellowship and the SAS Dissertation Research Award.</p>

    <p>Prior to entering the PhD program, I worked in development research and the public policy space for over eight years, mainly conducting mixed-methods impact evaluations and process assessments of government programs in India with a focus on governance and service delivery in the realms of social protection, nutrition, and early childhood education interventions. Right before arriving at Penn, I worked as a Senior Researcher on a <a href="https://casi.sas.upenn.edu/" target="_blank" rel="noopener">CASI</a> research project related to urbanization and female labor force participation in northern India. I have also worked as a researcher in <a href="https://www.opml.co.uk/" target="_blank" rel="noopener">Oxford Policy Management</a>&rsquo;s Poverty and Social Protection portfolio; <a href="https://www.idinsight.org/" target="_blank" rel="noopener">IDinsight</a>; and the Poverty, Health, and Nutrition Division of the <a href="https://www.ifpri.org/" target="_blank" rel="noopener">International Food Policy Research Institute</a> in New Delhi.</p>

    <p>I was awarded a full scholarship by the Cambridge Commonwealth Trust to pursue an MPhil in Development Studies from the <a href="https://www.cam.ac.uk/" target="_blank" rel="noopener">University of Cambridge</a>. Before this, I received an MA in Development Studies from the <a href="https://www.tiss.edu/" target="_blank" rel="noopener">Tata Institute of Social Sciences</a>, Mumbai, and a BA (Honours) in Economics from <a href="https://www.ststephens.edu/" target="_blank" rel="noopener">St. Stephen's College, Delhi University</a>.</p>


